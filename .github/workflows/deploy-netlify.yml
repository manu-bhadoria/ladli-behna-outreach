name: Deploy to Netlify

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: netlify-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ladli_behna_app/package-lock.json

      # Install dependencies manually; `netlify deploy --build` does not run
      # npm install when triggered via CLI (it only does so when the site's
      # git integration is active).
      - name: Install deps
        working-directory: ladli_behna_app
        run: npm ci --prefer-offline --no-audit

      - name: Build & Deploy to Netlify (production)
        run: |
          npx --yes netlify-cli@22 deploy \
            --build \
            --prod \
            --site=${{ secrets.NETLIFY_SITE_ID }} \
            --auth=${{ secrets.NETLIFY_AUTH_TOKEN }} \
            --message "gh-actions ${{ github.sha }}"
